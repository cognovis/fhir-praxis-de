adapter_sets:
  praxis-billing:
    version: 1.0.5
    title: cognovis Praxis Billing Bundle — Germany
    description: Meta-package that pins all FHIR terminology and IG packages required
      for ambulatory billing in German medical practices (GKV + PKV). Installing this
      single package pulls in bfarm, kbv, kbv-ebm, kbv-ldt, imaging, gu-rl, kfe-rl,
      hzv.vertraege, bak.goae (private billing), and the fhir-praxis-de IG.
    license: Proprietary
    dependencies:
      de.cognovis.fhir.praxis: 0.74.0
      de.cognovis.terminology.bfarm: 1.0.0
      de.cognovis.terminology.kbv: 1.0.0
      de.cognovis.terminology.kbv-ebm: 1.0.0
      de.cognovis.terminology.kbv-ldt: 1.0.2
      de.cognovis.terminology.imaging: 1.0.0
      de.cognovis.gba.gu-rl: 1.0.0
      de.cognovis.gba.kfe-rl: 1.0.0
      de.cognovis.hzv.vertraege: 1.1.0
      de.cognovis.bak.goae: 1.2.0
  dental-billing:
    version: 1.0.5
    title: cognovis Dental Billing Bundle — Germany
    description: 'Meta-package that pins all FHIR terminology and IG packages required
      for dental billing in Germany. Extends bundle.praxis-billing-de with dental-specific
      packages: fhir.dental IG, kzbv-bema, kzbv-bel-ii, kzbv-goz, dental.festzuschuss
      supplement, dental.dpf-kuerzel (KZBV EBZ Anlage 2 — Befund + Therapie + Bemerkungs-Kennzeichen),
      SWS 2.0 tooth finding and administrative enum terminologies, dental.icd11-na0d
      (WHO ICD-11 Andreasen TDI subset), orthodontic/model-analysis terminologies,
      CMD/bruxism terminologies, oral-surgery and jaw-pathology terminologies, karies
      + restoration wave terminologies, and endodontic finding terminologies for PAI,
      root canal configuration, and pulp exposure.'
    license: Proprietary
    dependencies:
      de.cognovis.fhir.praxis: 0.74.0
      de.cognovis.terminology.bfarm: 1.0.0
      de.cognovis.terminology.kbv: 1.0.0
