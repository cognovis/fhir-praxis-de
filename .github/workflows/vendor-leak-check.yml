name: Vendor Leak Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.7
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint
      - name: Run workflow guardrails
        run: |
          set -euo pipefail
          actionlint -config-file .github/actionlint.yaml
          python3 - <<'PY'
          from pathlib import Path
          import py_compile

          paths = []
          for root in (
              Path(".github/scripts"),
              Path("scripts"),
          ):
              if root.is_dir():
                  paths.extend(sorted(root.glob("*.py")))

          for path in paths:
              py_compile.compile(str(path), doraise=True)
          print(f"Compiled {len(paths)} Python script(s).")
          PY
      - name: Run vendor-leak guard
        run: bash scripts/check-ig-vendor-leaks.sh
      - name: Run IG pagecontent ADR-link guard
        run: bash scripts/check-ig-pagecontent-no-adr-links.sh
