# DEPRECATED (fmgt-5ff): This workflow managed release/publish/sync operations that
# are now owned by fhir-management. Automatic triggers have been removed.
# Kept for reference; activate manually via workflow_dispatch if needed during transition.
# See fhir-management docs/release-migration.md for the replacement commands.
#
# Original trigger replaced with workflow_dispatch-only below.

name: Public Release Watchdog

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Manual trigger reason
        required: false
        type: string
permissions:
  contents: read

concurrency:
  group: "public-release-watchdog"
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify public release surfaces
        env:
          VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 .github/scripts/verify-fhir-release-publication.py \
            --package-id de.cognovis.fhir.praxis \
            --public-ig-path https://fhir.cognovis.de/praxis \
            --repository "$GITHUB_REPOSITORY" \
            --check-public-root
