# IG CI — Cheap PR Validation (ADR-006)
#
# Runs only fast validation gates on ubuntu-latest.
# No self-hosted runners. No IG Publisher. No Aidbox.
#
# Heavy IG Publisher builds and npm publishing are handled locally:
#   - FHIR package publishing → scripts/release-fhir-packages.sh (Script 1)
#   - IG HTML build         → scripts/build-local-ig.sh (Script 3)
#
# Required PR status check: vendor-leak-check / check (vendor-leak-check.yml)
# This workflow provides additional compile and lint coverage.
#
# Praxis depends on private Verdaccio packages (de.cognovis.terminology.imaging,
# de.cognovis.terminology.kbv, kbv.mio.impfpass.vocab) that public FHIR mirrors
# return as 404, and on kbv.basis which ships without snapshots. The validate job
# therefore preloads the authenticated private packages and generates KBV Basis
# snapshots before the SUSHI compile. Fork PRs (no VERDACCIO_TOKEN) skip the
# compile gate and rely on vendor-leak-check; same-repo PRs get the full gate.

name: IG CI — Validate

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - 'LICENSE'
      - 'docs/**'
      - 'output/**'
      - 'fsh-generated/**'
  pull_request:
    branches: [main]

concurrency:
  group: "ig-ci-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}"
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (lint + SUSHI compile)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Verify version sync (VERSION vs sushi-config.yaml)
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          SUSHI_VERSION=$(grep '^version:' sushi-config.yaml | awk '{print $2}')
          if [ "$VERSION" != "$SUSHI_VERSION" ]; then
            echo "::error::VERSION ($VERSION) and sushi-config.yaml ($SUSHI_VERSION) are out of sync."
            exit 1
          fi
          echo "Version sync OK: $VERSION"

      - name: Vendor-leak check
        run: bash scripts/check-ig-vendor-leaks.sh

      - name: Install SUSHI
        run: |
          npm install -g fsh-sushi
          sushi --version

      # The SUSHI compile gate needs private Verdaccio dependencies in the FHIR
      # package cache. Only same-repo PRs/pushes have the VERDACCIO_TOKEN secret;
      # detect it and gate the compile accordingly.
      - name: Check private-registry access
        id: regaccess
        env:
          VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
        run: |
          if [ -n "${VERDACCIO_TOKEN:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERDACCIO_TOKEN not available (fork PR) — SUSHI compile gate skipped; vendor-leak-check still gates this PR."
          fi

      - name: Preload private FHIR packages
        if: steps.regaccess.outputs.available == 'true'
        env:
          VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
        run: bash scripts/preload-private-fhir-packages.sh

      - name: Generate KBV Basis snapshots
        if: steps.regaccess.outputs.available == 'true'
        uses: ./.github/actions/generate-kbv-basis-snapshots

      - name: SUSHI compile (structural validation)
        if: steps.regaccess.outputs.available == 'true'
        run: sushi . --snapshot
