# DEPRECATED (fmgt-5ff): This workflow managed release/publish/sync operations that
# are now owned by fhir-management. Automatic triggers have been removed.
# Kept for reference; activate manually via workflow_dispatch if needed during transition.
# See fhir-management docs/release-migration.md for the replacement commands.
#
# Original trigger replaced with workflow_dispatch-only below.

name: Package List Sync

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Manual trigger reason (workflow deprecated — use fhir-management)
        required: false
        type: string
      version:
        description: '[deprecated] Release version'
        required: false
        type: string
      date:
        description: '[deprecated] Release date YYYY-MM-DD'
        required: false
        type: string
permissions:
  contents: read

concurrency:
  group: "package-list-sync"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: [self-hosted, Linux, ARM64, netbird]
    steps:
      - uses: actions/checkout@v5

      - name: Update package-list.json on fhir.cognovis.de
        env:
          IG_VERSION: ${{ inputs.version }}
          RELEASE_DATE: ${{ inputs.date }}
          PACKAGE_ID: de.cognovis.fhir.praxis
          PUBLIC_IG_PATH: https://fhir.cognovis.de/praxis
          REMOTE_PACKAGE_LIST: /opt/fhir-proxy/html/praxis/package-list.json
          PACKAGE_LIST_EXACT_PATH_ONLY: "true"
          VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -n "${RELEASE_DATE}" ]; then
            TODAY="${RELEASE_DATE}"
          else
            TODAY=$(date -u +%Y-%m-%d)
          fi

          python3 .github/scripts/update-package-list-remote.py \
            "$IG_VERSION" "$TODAY" "$PACKAGE_ID" "$PUBLIC_IG_PATH" "$REMOTE_PACKAGE_LIST"

          python3 .github/scripts/verify-fhir-release-publication.py \
            --version "$IG_VERSION" \
            --package-id "$PACKAGE_ID" \
            --public-ig-path "$PUBLIC_IG_PATH" \
            --repository "$GITHUB_REPOSITORY"
