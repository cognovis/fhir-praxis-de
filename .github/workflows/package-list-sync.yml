name: Package List Sync

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to mark current
        required: true
        type: string
      date:
        description: Release date in YYYY-MM-DD format; defaults to today
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: "package-list-sync"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: [self-hosted, Linux, ARM64, netbird]
    steps:
      - uses: actions/checkout@v4

      - name: Update package-list.json on fhir.cognovis.de
        env:
          IG_VERSION: ${{ inputs.version }}
          RELEASE_DATE: ${{ inputs.date }}
          PACKAGE_ID: de.cognovis.fhir.praxis
          PUBLIC_IG_PATH: https://fhir.cognovis.de/praxis
          PUBLIC_PACKAGE_LIST_URL: https://fhir.cognovis.de/praxis/package-list.json
          REMOTE_PACKAGE_LIST: /opt/fhir-proxy/html/praxis/package-list.json
        run: |
          set -euo pipefail

          if [ -n "${RELEASE_DATE}" ]; then
            TODAY="${RELEASE_DATE}"
          else
            TODAY=$(date -u +%Y-%m-%d)
          fi

          python3 .github/scripts/update-package-list-remote.py \
            "$IG_VERSION" "$TODAY" "$PACKAGE_ID" "$PUBLIC_IG_PATH" "$REMOTE_PACKAGE_LIST"

          curl -fsSL "${PUBLIC_PACKAGE_LIST_URL}?run=${GITHUB_RUN_ID}" \
            | python3 .github/scripts/verify-public-package-list.py "$IG_VERSION" "$PACKAGE_ID" "$PUBLIC_IG_PATH"
