# IG Release — Create GitHub Release (ADR-006)
#
# Triggered by a v* tag push. Creates a GitHub Release and updates the
# public package-list.json on fhir.cognovis.de.
#
# FHIR package publishing is now done locally via scripts/release-fhir-packages.sh
# (Script 1 per ADR-006). The downstream-notify machinery has been retired.
#
# The public package-list.json advance on fhir.cognovis.de is ALSO done locally,
# AFTER Script 1 confirms the npm publish, via scripts/advance-package-list.sh
# (verify-before-write). It is intentionally NOT a CI step: advancing the public
# pointer from CI on tag-push could lead the registry (pointer written before the
# package is confirmed on npm).
#
# Release sequence:
#   0. Bump + commit version pins (fhir-sync-versions).
#   1. scripts/release-fhir-packages.sh — publish FHIR packages locally.
#   2. Push the release tag: git tag v<VERSION> && git push origin v<VERSION>
#      → triggers this workflow.
#   3. scripts/advance-package-list.sh — verify-on-npm then advance the public
#      package-list.json pointer (after Script 1 confirms publish).
#   4. Optionally: scripts/build-local-ig.sh — build IG HTML site locally.

name: IG Release — Create GitHub Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: "ig-release"
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION file
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag ${TAG_VERSION} does not match VERSION file ${FILE_VERSION}"
            exit 1
          fi
          echo "Version match confirmed: ${FILE_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true
