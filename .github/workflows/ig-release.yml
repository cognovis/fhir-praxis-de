# IG Release — Create GitHub Release (ADR-006)
#
# Triggered by a v* tag push. Creates a GitHub Release and updates the
# public package-list.json on fhir.cognovis.de.
#
# FHIR package publishing is now done locally via scripts/release-fhir-packages.sh
# (Script 1 per ADR-006). The downstream-notify machinery
# downstream-notify machinery has been retired (ADR-006).
#
# Release sequence:
#   0. Bump + commit version pins (fhir-sync-versions).
#   1. scripts/release-fhir-packages.sh — publish FHIR packages locally.
#   2. Push the release tag: git tag v<VERSION> && git push origin v<VERSION>
#      → triggers this workflow.
#   3. Optionally: scripts/build-local-ig.sh — build IG HTML site locally.

name: IG Release — Create GitHub Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: "ig-release"
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION file
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag ${TAG_VERSION} does not match VERSION file ${FILE_VERSION}"
            exit 1
          fi
          echo "Version match confirmed: ${FILE_VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true

  update-package-list:
    name: Update package-list.json on fhir.cognovis.de
    needs: create-release
    runs-on: [self-hosted, Linux, ARM64, netbird]
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update package-list.json on fhir.cognovis.de
        env:
          IG_VERSION: ${{ steps.version.outputs.version }}
          PACKAGE_ID: de.cognovis.fhir.praxis
          PUBLIC_IG_PATH: https://fhir.cognovis.de/praxis
          REMOTE_PACKAGE_LIST: /opt/fhir-proxy/html/praxis/package-list.json
          PACKAGE_LIST_EXACT_PATH_ONLY: "true"
          VERDACCIO_TOKEN: ${{ secrets.VERDACCIO_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TODAY=$(date -u +%Y-%m-%d)
          python3 .github/scripts/update-package-list-remote.py \
            "$IG_VERSION" "$TODAY" "$PACKAGE_ID" "$PUBLIC_IG_PATH" "$REMOTE_PACKAGE_LIST"
          python3 .github/scripts/verify-fhir-release-publication.py \
            --version "$IG_VERSION" \
            --package-id "$PACKAGE_ID" \
            --public-ig-path "$PUBLIC_IG_PATH" \
            --repository "$GITHUB_REPOSITORY"
