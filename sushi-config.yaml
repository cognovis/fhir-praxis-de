id: de.cognovis.fhir.praxis
canonical: https://fhir.cognovis.de/praxis
name: GermanPracticeManagementProfiles
title: German Practice Management FHIR Profiles (R4)
description: >-
  FHIR R4 profiles for German ambulatory practice management (Praxisverwaltung) —
  billing (EBM/GOA), budget management (RLV/QZV), remittance (Honorarbescheid),
  queue management, AI provenance (EU AI Act), and administrative workflows.
  Built on German base profiles (de.basisprofil.r4, KBV, DGUV) with documented
  international interoperability mappings.
status: active
version: 0.62.0
fhirVersion: 4.0.1
copyrightYear: 2026+
releaseLabel: STU1
license: CC-BY-4.0
publisher:
  name: cognovis GmbH
  url: https://www.cognovis.de
  email: info@cognovis.de
jurisdiction: urn:iso:std:iso:3166#DE "Germany"

dependencies:
  de.basisprofil.r4:
    version: 1.6.0-ballot2
    uri: http://fhir.de/ImplementationGuide/basisprofil-de-r4
  hl7.terminology.r4: 7.1.0
  fhir.dicom: 2022.4.20221006
  de.cognovis.terminology.imaging: 2026.0.0
  ihe.rad.imr: 1.1.0
  dvmd.kdl.r4: 2025.0.1
  hl7.fhir.uv.ips: 1.1.0
  # KBV-MIO-Impfpass vocabulary repackage (cognovis-internal):
  # Subset of kbv.mio.impfpass@1.1.0 with the dimdi-tainted ValueSets/ConceptMaps
  # removed, so it carries no de.basisprofil.r4@0.9.12 transitive dependency.
  # The 0.9.12 → 1.6.0-ballot2 namespace rename (dimdi/* → bfarm/*) made the
  # upstream package incompatible with our basisprofil pinning. We only need
  # the SNOMED-/KBV-internal vocab (KBV_VS_MIO_Vaccination_Vaccine_List et al.)
  # for extensible bindings on PraxisImmunization.vaccineCode — no profile
  # inheritance from KBV-MIO. Provenance + included resource list:
  # github.com/cognovis/kbv-mio-vocabulary (TODO: create repo).
  kbv.mio.impfpass.vocab: 1.1.0-cognovis.1
  # kbv.mio.laborbefund removed: v1.0.0-kommentierung.2 has snapshot bugs
  # (Unknown path in Patient.gender.extension). Our profiles don't inherit
  # from KBV MIO — re-add when KBV fixes their package.
  # kbv.basis ships WITHOUT snapshots (KBV publishing oversight — see
  # .github/actions/generate-kbv-basis-snapshots/README.md). The
  # generate-kbv-basis-snapshots CI action injects them before SUSHI runs.
  kbv.basis: 1.8.0

