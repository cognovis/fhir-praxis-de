id: de.cognovis.fhir.praxis
canonical: https://fhir.cognovis.de/praxis
name: GermanPracticeManagementProfiles
title: German Practice Management FHIR Profiles (R4)
description: >-
  FHIR R4 profiles for German ambulatory practice management (Praxisverwaltung) —
  billing (EBM/GOA), budget management (RLV/QZV), remittance (Honorarbescheid),
  queue management, AI provenance (EU AI Act), and administrative workflows.
  Built on German base profiles (de.basisprofil.r4, KBV, DGUV) with documented
  international interoperability mappings.
