id: de.cognovis.fhir.praxis
canonical: https://fhir.cognovis.de/praxis
name: GermanPracticeManagementProfiles
title: German Practice Management FHIR Profiles (R4)
description: >-
  FHIR R4 profiles for German ambulatory practice management (Praxisverwaltung) —
  billing (EBM/GOA), budget management (RLV/QZV), remittance (Honorarbescheid),
  queue management, AI provenance (EU AI Act), and administrative workflows.
  Built on German base profiles (de.basisprofil.r4, KBV, DGUV) with documented
  international interoperability mappings.
status: draft
version: 0.1.0
fhirVersion: 4.0.1
copyrightYear: 2026+
releaseLabel: ci-build
license: CC-BY-4.0
publisher:
  name: cognovis GmbH
  url: https://www.cognovis.de
  email: info@cognovis.de
jurisdiction: urn:iso:std:iso:3166#DE "Germany"

dependencies:
  de.basisprofil.r4: 1.5.0
  kbv.basis: 1.8.0
  kbv.ita.for: 1.3.1
  kbv.ita.aws: 1.2.0              # PVS-Archivierungs-/Wechselschnittstelle (Mahnung, Abrechnung)
  kbv.all.st-combined: 1.32.0     # KBV Schluesseltabellen (Scheinart, Fachgruppen, EBM RLV)
  DGUV.Basis: 1.4.0               # BG/Arbeitsunfall

